
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas Barbearia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#111;
  color:#fff;
}

header{
  background:#000;
  padding:40px 20px;
  text-align:center;
}

header h1{
  font-size:2.5rem;
  color:#00ff88;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.servicos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:#1b1b1b;
  padding:20px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#222;
}

.preco{
  color:#00ff88;
  font-size:1.2rem;
  margin-top:10px;
  font-weight:bold;
}

.btn{
  display:inline-block;
  margin-top:40px;
  padding:15px 35px;
  background:#00ff88;
  color:#000;
  text-decoration:none;
  font-weight:bold;
  border-radius:40px;
  transition:0.3s;
}

.btn:hover{
  background:#00cc6a;
}

footer{
  background:#000;
  text-align:center;
  padding:20px;
  color:#aaa;
  margin-top:40px;
}
</style>
</head>

<body>

<header>
<h1>Lucas Barbearia</h1>
<p>Sua barbearia de confiança</p>
</header>

<div class="container">

<h2 style="text-align:center;">Serviços</h2>

<div class="servicos">
  <div class="card">
    <h3>Corte</h3>
    <p class="preco">R$25</p>
  </div>

  <div class="card">
    <h3>Barba</h3>
    <p class="preco">R$20</p>
  </div>

  <div class="card">
    <h3>Corte + Barba</h3>
    <p class="preco">R$40</p>
  </div>
</div>

<div style="text-align:center;">
<a class="btn" href="https://wa.me/5586999999999" target="_blank">
Agendar pelo WhatsApp
</a>
</div>

</div>

<footer>
© 2026 Lucas Barbearia - Todos os direitos reservados
</footer>

</body>
</html>
